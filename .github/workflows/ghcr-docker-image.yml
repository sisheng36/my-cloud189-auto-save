name: Build and Push to GHCR

# 允许手动触发工作流，也可以配置当推送到主干或开发分支时自动触发
on:
  workflow_dispatch:
    inputs:
      version:
        description: '输入要构建的镜像版本号 (例如: 1.0.0)，留空则自动从 package.json 读取'
        required: false
        default: ''
  push:
    branches: [ "main", "master", "dev" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 从 package.json 读取版本号
        id: pkg_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: 确定最终构建版本号
        id: final_version
        run: |
          # 手动触发且填了版本号则用手动输入的，否则读 package.json
          INPUT_VERSION="${{ github.event.inputs.version }}"
          PKG_VERSION="${{ steps.pkg_version.outputs.version }}"
          FINAL="${INPUT_VERSION:-$PKG_VERSION}"
          echo "version=$FINAL" >> $GITHUB_OUTPUT
          echo "将使用版本号: $FINAL"

      - name: 生成分支镜像标签
        id: image_tags
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="${{ steps.final_version.outputs.version }}"
          if [ "$BRANCH" = "dev" ]; then
            echo "version_tag=dev-$VERSION" >> $GITHUB_OUTPUT
            echo "latest_tag=dev-latest" >> $GITHUB_OUTPUT
          else
            echo "version_tag=$VERSION" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 如需支持 arm64，请取消下方注释（构建速度会变慢）
          # platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image_tags.outputs.version_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image_tags.outputs.latest_tag }}
          labels: ${{ steps.meta.outputs.labels }}
